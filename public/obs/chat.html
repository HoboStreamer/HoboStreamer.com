<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Overlay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<style>
/* ── OBS Browser Source: transparent background ─────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    color: #fff;
    height: 100%;
    width: 100%;
}

#chat-container {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    width: 100%;
    padding: 8px 12px;
    overflow: hidden;
}

/* ── Messages ───────────────────────────────────────────────── */
.msg {
    padding: 4px 0;
    line-height: 1.45;
    word-wrap: break-word;
    overflow-wrap: break-word;
    animation: msg-in 0.25s ease-out;
    text-shadow:
        -1px -1px 1px rgba(0,0,0,0.8),
         1px -1px 1px rgba(0,0,0,0.8),
        -1px  1px 1px rgba(0,0,0,0.8),
         1px  1px 1px rgba(0,0,0,0.8),
         0    0   4px rgba(0,0,0,0.6);
}

@keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Fade out old messages ──────────────────────────────────── */
.msg.fading {
    animation: msg-fade 1s ease-out forwards;
}
@keyframes msg-fade {
    to { opacity: 0; }
}

/* ── Username ───────────────────────────────────────────────── */
.username {
    font-weight: 700;
}

/* ── Platform badge ─────────────────────────────────────────── */
.badge {
    display: inline-block;
    font-size: 0.7em;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
    text-shadow: none;
    letter-spacing: 0.3px;
}
.badge-twitch  { background: #9146ff; color: #fff; }
.badge-kick    { background: #53fc18; color: #000; }
.badge-youtube { background: #ff0000; color: #fff; }
.badge-rs      { background: #ff6600; color: #fff; }

/* ── Chat badges (icon-based, matching main chat) ──────────── */
.chat-badge {
    display: inline-flex; align-items: center;
    margin-right: 4px;
    font-size: 0.8em;
    vertical-align: middle;
    text-shadow: none;
}
.chat-badge-admin    { color: #f39c12; }
.chat-badge-streamer { color: #e74c3c; }
.chat-badge-mod      { color: #2ecc71; }
.chat-badge-sub      { color: #3498db; }
.chat-badge i { font-size: 0.75rem; }

/* ── System messages ────────────────────────────────────────── */
.msg.system {
    color: #aaa;
    font-style: italic;
    font-size: 0.9em;
}

/* ── Emotes ─────────────────────────────────────────────────── */
.emote {
    display: inline-block;
    height: 28px;
    vertical-align: middle;
    margin: -2px 1px;
}

/* ══════════════════════════════════════════════════════════════
   NAME EFFECTS — from cosmetics.css
   ══════════════════════════════════════════════════════════════ */
.name-fx-rainbow {
    background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088);
    background-size: 400% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxRainbow 3s linear infinite;
}
@keyframes nameFxRainbow { 0%{background-position:0% 50%} 100%{background-position:400% 50%} }

.name-fx-fire {
    color: #ff6600 !important;
    text-shadow: 0 0 6px #ff4400, 0 0 12px #ff220088, 0 0 20px #cc110044;
    animation: nameFxFire 1.5s ease-in-out infinite alternate;
}
@keyframes nameFxFire {
    0%{text-shadow:0 0 6px #ff4400,0 0 12px #ff220088;color:#ff6600}
    100%{text-shadow:0 0 10px #ff8800,0 0 20px #ff440088,0 0 30px #cc220044;color:#ffaa00}
}

.name-fx-ice {
    color: #88ddff !important;
    text-shadow: 0 0 6px #44bbff88, 0 0 12px #2288cc44;
    animation: nameFxIce 2s ease-in-out infinite alternate;
}
@keyframes nameFxIce {
    0%{text-shadow:0 0 4px #44bbff88;color:#88ddff}
    100%{text-shadow:0 0 10px #66eeff,0 0 20px #44bbff88;color:#bbffff}
}

.name-fx-golden {
    background: linear-gradient(90deg, #ffd700, #ffec80, #ffd700, #ffb800);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxGolden 2s ease-in-out infinite;
    filter: drop-shadow(0 0 4px #ffd70066);
}
@keyframes nameFxGolden { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

.name-fx-neon {
    color: #00ff88 !important;
    text-shadow: 0 0 8px #00ff88, 0 0 16px #00ff8888, 0 0 24px #00cc6644;
    animation: nameFxNeon 1.2s ease-in-out infinite alternate;
}
@keyframes nameFxNeon {
    0%{text-shadow:0 0 4px #00ff88,0 0 8px #00ff8866}
    100%{text-shadow:0 0 12px #00ff88,0 0 24px #00ff88aa,0 0 36px #00cc6666}
}

.name-fx-galaxy {
    background: linear-gradient(90deg, #8b5cf6, #ec4899, #3b82f6, #8b5cf6);
    background-size: 400% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxGalaxy 4s linear infinite;
    filter: drop-shadow(0 0 6px #8b5cf644);
}
@keyframes nameFxGalaxy { 0%{background-position:0% 50%} 100%{background-position:400% 50%} }

.name-fx-void {
    color: #9900ff !important;
    text-shadow: 0 0 8px #6600cc, 0 0 16px #33006688, 0 0 24px #11003344;
    animation: nameFxVoid 2s ease-in-out infinite;
}
@keyframes nameFxVoid {
    0%,100%{text-shadow:0 0 8px #6600cc,0 0 16px #33006688;transform:scale(1)}
    50%{text-shadow:0 0 12px #9900ff,0 0 24px #6600ccaa,0 0 36px #33006666;transform:scale(1.03)}
}

.name-fx-toxic {
    background: linear-gradient(90deg, #00ff44, #88ff00, #ccff00, #00ff88);
    background-size: 200% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxToxic 1.8s ease-in-out infinite alternate;
}
@keyframes nameFxToxic { 0%{background-position:0% 50%;filter:brightness(1)} 100%{background-position:200% 50%;filter:brightness(1.3)} }

.name-fx-blood {
    background: linear-gradient(180deg, #ff0000, #880000, #ff2222);
    background-size: 100% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxBlood 2s ease-in-out infinite;
}
@keyframes nameFxBlood { 0%,100%{background-position:50% 0%} 50%{background-position:50% 200%} }

.name-fx-shadow {
    color: #aa88cc !important;
    animation: nameFxShadow 2s ease-in-out infinite;
}
@keyframes nameFxShadow {
    0%,100%{text-shadow:0 0 6px rgba(0,0,0,0.8),0 0 12px rgba(80,0,120,0.6),2px 2px 4px rgba(0,0,0,0.9)}
    50%{text-shadow:0 0 12px rgba(0,0,0,0.9),0 0 24px rgba(80,0,120,0.8),4px 4px 8px rgba(0,0,0,1)}
}

.name-fx-glitch {
    color: #00ff88 !important;
    animation: nameFxGlitch 0.15s infinite;
    text-shadow: 2px 0 #ff0044, -2px 0 #00ccff;
}
@keyframes nameFxGlitch {
    0%{transform:translate(0)} 20%{transform:translate(-1px,1px)} 40%{transform:translate(1px,-1px)}
    60%{transform:translate(-1px,0)} 80%{transform:translate(1px,1px)} 100%{transform:translate(0)}
}

.name-fx-hologram {
    background: linear-gradient(90deg, #00ffcc, #00ccff, #8888ff, #00ffaa);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxHoloFlicker 0.12s infinite, nameFxHoloShift 3s linear infinite;
}
@keyframes nameFxHoloFlicker { 0%,45%,55%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes nameFxHoloShift { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }

.name-fx-divine {
    background: linear-gradient(90deg, #ffffff, #ffe066, #ffffff, #ffcc00, #ffffff);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameFxDivine 2s ease-in-out infinite;
    filter: drop-shadow(0 0 8px #ffe06688);
}
@keyframes nameFxDivine { 0%,100%{background-position:0% 50%} 50%{background-position:300% 50%} }

/* ══════════════════════════════════════════════════════════════
   PARTICLE EFFECTS
   ══════════════════════════════════════════════════════════════ */
.chat-particle-wrap {
    position: relative;
    display: inline-block;
}
.chat-particle {
    position: absolute;
    pointer-events: none;
    font-size: 10px;
    opacity: 0;
    animation: chatParticleFloat 1.8s ease-out forwards;
}
@keyframes chatParticleFloat {
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--px-dx,10px),var(--px-dy,-20px)) scale(0.4)}
}
.px-sparkle .chat-particle { color: #ffd700; }
.px-hearts .chat-particle  { color: #ff6b9d; }
.px-flames .chat-particle  { color: #ff6600; }
.px-stars .chat-particle   { color: #fbbf24; }
.px-void .chat-particle    { color: #9900ff; }

/* ══════════════════════════════════════════════════════════════
   HAT EFFECTS
   ══════════════════════════════════════════════════════════════ */
.chat-hat {
    display: inline-block;
    margin-right: 2px;
    font-size: 0.85em;
    vertical-align: middle;
}
.chat-hat.hat-float { animation: chatHatFloat 2s ease-in-out infinite; }
.chat-hat.hat-pulse { animation: chatHatPulse 1.5s ease-in-out infinite; }
.chat-hat.hat-warp  { animation: chatHatWarp 2s ease-in-out infinite; }
@keyframes chatHatFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes chatHatPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
@keyframes chatHatWarp  { 0%,100%{transform:scale(1) rotate(0deg);filter:hue-rotate(0deg)} 50%{transform:scale(1.1) rotate(5deg);filter:hue-rotate(180deg)} }

/* ── Status overlay ─────────────────────────────────────────── */
#status {
    position: fixed;
    top: 8px;
    right: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    text-shadow: 0 0 3px rgba(0,0,0,0.8);
    pointer-events: none;
    transition: opacity 0.3s;
}
#status.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="chat-container"></div>
<div id="status"></div>

<script>
(function() {
    'use strict';

    // ── Config ─────────────────────────────────────────────────
    const MAX_MESSAGES = 50;
    const FADE_AFTER_MS = 60000;      // Fade messages after 60s (0 = never)
    const RECONNECT_BASE = 2000;
    const RECONNECT_MAX = 30000;
    const EMOTE_LOAD_INTERVAL = 300000; // Refresh emotes every 5 min

    // ── Parse username (and optional slot) from URL ──────────
    // Supported: /obs/chat/:username, /overlay/chat/:username, /overlay/chat/:username/:slot
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    let username = '';
    let slotParam = null;
    if (pathParts[0] === 'overlay' && pathParts[1] === 'chat') {
        username = decodeURIComponent(pathParts[2] || '');
        slotParam = pathParts[3] ? decodeURIComponent(pathParts[3]) : null;
    } else if (pathParts[0] === 'obs' && pathParts[1] === 'chat') {
        username = decodeURIComponent(pathParts[2] || '');
    }
    username = username.trim();
    const lookupUsername = username.toLowerCase();
    const isGlobalOverlay = pathParts[0] === 'overlay' && pathParts[1] === 'chat' && !slotParam;
    if (!username) {
        document.getElementById('chat-container').innerHTML =
            '<div class="msg system">No username specified. Use /overlay/chat/yourusername</div>';
        return;
    }

    const container = document.getElementById('chat-container');
    const statusEl = document.getElementById('status');

    let ws = null;
    let streamId = null;
    let channelUserId = null;
    let reconnectDelay = RECONNECT_BASE;
    let reconnectTimer = null;
    let intentionalClose = false;
    let emoteMap = {};           // code → {url, animated}
    let fadeTimers = [];

    // ── URL params for customization ───────────────────────────
    // ?fade=0        — disable message fading
    // ?max=100       — max visible messages
    // ?fontsize=20   — font size in px
    // ?bg=000000cc   — background color (hex with optional alpha)
    const params = new URLSearchParams(window.location.search);
    const fadeAfter = params.has('fade') ? parseInt(params.get('fade'), 10) : FADE_AFTER_MS;
    const maxMsgs = params.has('max') ? parseInt(params.get('max'), 10) : MAX_MESSAGES;
    if (params.has('fontsize')) {
        document.body.style.fontSize = params.get('fontsize') + 'px';
    }
    if (params.has('bg')) {
        const bg = params.get('bg');
        document.body.style.background = bg.startsWith('#') ? bg : '#' + bg;
    }

    // ── Utility ────────────────────────────────────────────────
    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function setStatus(text) {
        statusEl.textContent = text;
        statusEl.classList.remove('hidden');
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.add('hidden'), 5000);
    }

    // ── Emote parsing ──────────────────────────────────────────
    function parseEmotes(text) {
        if (!Object.keys(emoteMap).length) return esc(text);
        // Split on whitespace, replace known emote codes with <img>
        return text.split(/(\s+)/).map(token => {
            const emote = emoteMap[token];
            if (emote) {
                const cls = emote.animated ? 'emote emote-animated' : 'emote';
                return `<img class="${cls}" src="${esc(emote.url)}" alt="${esc(token)}" title="${esc(token)}">`;
            }
            return esc(token);
        }).join('');
    }

    async function loadEmotes() {
        if (!streamId) return;
        try {
            const resp = await fetch(`/api/emotes/all/${streamId}`);
            if (!resp.ok) return;
            const data = await resp.json();
            const map = {};
            for (const emote of (data.emotes || [])) {
                map[emote.code] = { url: emote.url, animated: !!emote.animated };
            }
            emoteMap = map;
        } catch { /* ignore */ }
    }

    // ── Platform detection ─────────────────────────────────────
    const PLATFORM_RE = /^\[(Twitch|Kick|YouTube|RS)\]\s*/;
    const PLATFORM_COLORS = {
        Twitch:  '#9146ff',
        Kick:    '#53fc18',
        YouTube: '#ff0000',
        RS:      '#ff6600',
    };

    function detectPlatform(name) {
        const m = name.match(PLATFORM_RE);
        if (m) return { platform: m[1], cleanName: name.slice(m[0].length) };
        return { platform: null, cleanName: name };
    }

    // ── Role badge (icon-based, matches main chat) ────────────
    function getBadgeHTML(role) {
        switch (role) {
            case 'admin':     return '<span class="chat-badge chat-badge-admin" title="Admin"><i class="fa-solid fa-shield"></i></span>';
            case 'streamer':  return '<span class="chat-badge chat-badge-streamer" title="Streamer"><i class="fa-solid fa-broadcast-tower"></i></span>';
            case 'global_mod':
            case 'mod':
            case 'moderator': return '<span class="chat-badge chat-badge-mod" title="Moderator"><i class="fa-solid fa-gavel"></i></span>';
            case 'subscriber': return '<span class="chat-badge chat-badge-sub" title="Subscriber"><i class="fa-solid fa-star"></i></span>';
            default: return '';
        }
    }

    // ── Particle spawner ───────────────────────────────────────
    function spawnParticles(wrap, chars) {
        const charArr = [...chars];
        const count = 3 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const p = document.createElement('span');
            p.className = 'chat-particle';
            p.textContent = charArr[Math.floor(Math.random() * charArr.length)];
            const dx = (Math.random() - 0.5) * 40;
            const dy = -10 - Math.random() * 25;
            p.style.setProperty('--px-dx', `${dx}px`);
            p.style.setProperty('--px-dy', `${dy}px`);
            p.style.left = `${Math.random() * 80}%`;
            p.style.top = `${Math.random() * 60}%`;
            p.style.animationDelay = `${Math.random() * 0.4}s`;
            wrap.appendChild(p);
            setTimeout(() => p.remove(), 2200);
        }
    }

    // ── Render message ─────────────────────────────────────────
    function addMessage(msg) {
        if (isGlobalOverlay && msg.type === 'system') {
            return;
        }
        if (msg.type === 'chat' && isGlobalOverlay) {
            if (!msg.stream_channel || msg.stream_channel.toLowerCase() !== lookupUsername) {
                return;
            }
        }
        if (msg.type === 'system') {
            const el = document.createElement('div');
            el.className = 'msg system';
            el.textContent = msg.message || msg.text || '';
            appendMessage(el);
            return;
        }

        if (msg.type !== 'chat') return;

        const rawName = msg.username || msg.displayName || (msg.anonId ? `anon${msg.anonId}` : 'anon');
        const { platform, cleanName } = detectPlatform(rawName);

        const el = document.createElement('div');
        el.className = 'msg';

        // Platform badge
        let platformBadge = '';
        if (platform) {
            const cls = 'badge-' + platform.toLowerCase();
            platformBadge = `<span class="badge ${cls}">${esc(platform)}</span>`;
        }

        // Role badge (icon)
        const roleBadge = getBadgeHTML(msg.role);

        // Hat effect (emoji before username)
        let hatHtml = '';
        if (msg.hatFX && msg.hatFX.hatChar) {
            const animClass = msg.hatFX.animated ? ` hat-${esc(msg.hatFX.animated)}` : '';
            hatHtml = `<span class="chat-hat${animClass}">${esc(msg.hatFX.hatChar)}</span>`;
        }

        // Name effect CSS class
        const nameFXClass = msg.nameFX?.cssClass ? ` ${esc(msg.nameFX.cssClass)}` : '';

        // Particle effect wrapper
        const hasParticles = msg.particleFX?.chars;
        const particleOpen = hasParticles ? `<span class="chat-particle-wrap ${esc(msg.particleFX.cssClass || '')}">` : '';
        const particleClose = hasParticles ? '</span>' : '';

        // Name color
        let nameColor = msg.color || msg.profile_color || '#fff';
        if (platform) nameColor = PLATFORM_COLORS[platform] || nameColor;

        // Message text with emotes
        const rawText = msg.message || msg.text || '';
        const text = parseEmotes(rawText);

        // Reply header for OBS overlay
        let replyHtml = '';
        if (msg.reply_to) {
            const replyUser = esc(msg.reply_to.username || 'unknown');
            const replySnippet = esc(msg.reply_to.message || '');
            replyHtml = `<div style="font-size:0.72em;opacity:0.6;margin-bottom:1px"><i class="fa-solid fa-reply fa-flip-horizontal" style="font-size:0.6em"></i> @${replyUser} ${replySnippet}</div>`;
        }

        el.innerHTML = `${replyHtml}${platformBadge}${roleBadge}${hatHtml}${particleOpen}<span class="username${nameFXClass}" style="color:${esc(nameColor)}">${esc(cleanName)}</span>${particleClose}: ${text}`;

        // Spawn particles
        if (hasParticles) {
            const wrap = el.querySelector('.chat-particle-wrap');
            if (wrap) spawnParticles(wrap, msg.particleFX.chars);
        }

        appendMessage(el);
    }

    function appendMessage(el) {
        container.appendChild(el);

        // Trim old messages
        while (container.children.length > maxMsgs) {
            container.removeChild(container.firstChild);
        }

        // Schedule fade
        if (fadeAfter > 0) {
            const timer = setTimeout(() => {
                el.classList.add('fading');
                setTimeout(() => { if (el.parentNode) el.remove(); }, 1100);
            }, fadeAfter);
            fadeTimers.push(timer);
        }

        // Auto-scroll (flex end handles this naturally, but force it)
        container.scrollTop = container.scrollHeight;
    }

    // ── Resolve stream ID from username (+ optional slot) ─────
    async function resolveStream() {
        setStatus('Looking up channel...');
        try {
            const resp = await fetch(`/api/streams/channel/${encodeURIComponent(lookupUsername)}`);
            if (!resp.ok) {
                setStatus(resp.status === 404 ? 'Channel not found' : 'Error loading channel');
                return false;
            }
            const data = await resp.json();
            channelUserId = data.channel?.user_id;

            // Collect all live streams
            const allStreams = [];
            if (data.stream && data.stream.id) allStreams.push(data.stream);
            if (data.streams) allStreams.push(...data.streams);

            if (isGlobalOverlay) {
                setStatus('Channel found — loading chat...');
                streamId = null;
                return true;
            }

            if (allStreams.length > 0) {
                if (slotParam) {
                    // Match by managed_stream_id or slug
                    const slotNum = parseInt(slotParam, 10);
                    const match = allStreams.find(s =>
                        (slotNum && s.managed_stream_id === slotNum) ||
                        s.managed_stream_slug === slotParam
                    );
                    if (match) {
                        streamId = match.id;
                        return true;
                    }
                    // Slot specified but not live — try to find managed stream for slot
                    if (data.managedStreams) {
                        const ms = data.managedStreams.find(m =>
                            (slotNum && m.id === slotNum) || m.slug === slotParam
                        );
                        if (ms) {
                            setStatus(`${ms.title || 'Slot'} is offline — waiting...`);
                            return false;
                        }
                    }
                    setStatus('Slot not found — waiting for stream...');
                    return false;
                }

                // No slot specified — use first live stream
                streamId = allStreams[0].id;
                return true;
            }

            setStatus('Channel offline — waiting for stream...');
            return false;
        } catch (err) {
            setStatus('Network error');
            return false;
        }
    }

    // ── WebSocket connection ───────────────────────────────────
    function connectChat() {
        if (ws) {
            intentionalClose = true;
            ws.close();
            ws = null;
        }

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const host = location.hostname;
        const port = location.port || (proto === 'wss' ? '443' : '80');
        const wsUrl = `${proto}://${host}:${port}/ws/chat${streamId ? `?stream=${streamId}` : ''}`;

        ws = new WebSocket(wsUrl);
        intentionalClose = false;

        ws.onopen = () => {
            reconnectDelay = RECONNECT_BASE;
            ws.send(JSON.stringify({ type: 'join', streamId }));
            setStatus('Connected');
        };

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                addMessage(msg);
            } catch { /* ignore */ }
        };

        ws.onclose = () => {
            if (!intentionalClose) {
                setStatus('Disconnected — reconnecting...');
                scheduleReconnect();
            }
        };

        ws.onerror = () => {
            // onclose will fire after this
        };
    }

    function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(async () => {
            reconnectTimer = null;
            // Re-resolve in case stream changed
            const ok = await resolveStream();
            if (ok) {
                connectChat();
            } else {
                // Channel offline — keep polling
                reconnectDelay = Math.min(reconnectDelay * 1.5, RECONNECT_MAX);
                scheduleReconnect();
            }
        }, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, RECONNECT_MAX);
    }

    // ── Load chat history ──────────────────────────────────────
    async function loadHistory() {
        const url = isGlobalOverlay
            ? `/api/chat/global/history?username=${encodeURIComponent(lookupUsername)}&limit=${maxMsgs}`
            : `/api/chat/${streamId}/history?limit=30`;
        if (!isGlobalOverlay && !streamId) return;
        try {
            const resp = await fetch(url);
            if (!resp.ok) return;
            const data = await resp.json();
            const messages = data.messages || data || [];
            // Render in chronological order (API returns newest first)
            const sorted = [...messages].reverse();
            for (const msg of sorted) {
                addMessage(msg);
            }
        } catch { /* ignore */ }
    }

    // ── Bootstrap ──────────────────────────────────────────────
    async function init() {
        const ok = await resolveStream();
        if (ok) {
            await loadEmotes();
            await loadHistory();
            connectChat();

            // Periodic emote refresh
            setInterval(loadEmotes, EMOTE_LOAD_INTERVAL);
        } else {
            // Poll until stream comes online
            scheduleReconnect();
        }
    }

    init();
})();
</script>
</body>
</html>
